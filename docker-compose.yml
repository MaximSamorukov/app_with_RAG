services:
  # PostgreSQL 16 with pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_assistant
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - rag_network

  # Redis 7 for BullMQ queues
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - rag_network

  # API Server (Node.js + Express)
  # Reads S3 configuration from .env file
  api:
    build:
      context: .
      dockerfile: server/api/Dockerfile
    container_name: rag_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3000
      # Database connection - use postgres service inside Docker network
      DB_HOST: postgres
      DB_PORT: 5433
      DB_NAME: rag_assistant
      DB_USER: postgres
      DB_PASSWORD: postgres
      # Redis connection - use redis service inside Docker network
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # S3 configuration - loaded from .env file
      # S3_ENDPOINT, S3_REGION, S3_BUCKET, S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY, S3_FORCE_PATH_STYLE
    ports:
      - "3000:3000"
    volumes:
      - ./server/api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev
    networks:
      - rag_network

  # Background Worker (BullMQ)
  # Reads S3 configuration from .env file
  worker:
    build:
      context: .
      dockerfile: server/worker/Dockerfile
    container_name: rag_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      # Database connection - use postgres service inside Docker network
      DB_HOST: postgres
      DB_PORT: 5433
      DB_NAME: rag_assistant
      DB_USER: postgres
      DB_PASSWORD: postgres
      # Redis connection - use redis service inside Docker network
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # S3 configuration - loaded from .env file
      # S3_ENDPOINT, S3_REGION, S3_BUCKET, S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY, S3_FORCE_PATH_STYLE
    volumes:
      - ./server/worker:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev
    networks:
      - rag_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  rag_network:
    driver: bridge
